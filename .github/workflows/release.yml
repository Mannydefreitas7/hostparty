name: Release and Publish

on:
  push:
    tags:
      - 'v*.*.*'
      - 'release-*'
  pull_request:
    types: [closed]
    branches: [ main, master ]

jobs:
  release:
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && 
       (startsWith(github.head_ref, 'release/') || contains(github.event.pull_request.labels.*.name, 'release')))
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
        
    - name: Setup Node.js for NPM
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
        
    - name: Install dependencies
      run: bun install --frozen-lockfile
      
    - name: Run tests
      run: bun test
      
    - name: Build project
      run: bun run build
      
    - name: Extract version from tag or package.json
      id: version
      run: |
        if [[ $GITHUB_EVENT_NAME == "push" ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
        else
          VERSION=$(node -p "require('./package.json').version")
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $VERSION"
        
    - name: Update package.json version
      if: github.event_name == 'push'
      run: |
        VERSION=${{ steps.version.outputs.version }}
        bun version $VERSION --no-git-tag-version
        
    - name: Create GitHub Release
      if: github.event_name == 'push'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ steps.version.outputs.version }}
        body: |
          ## Changes in ${{ steps.version.outputs.version }}
          
          🎉 New release of HostParty!
          
          ### What's Changed
          - TypeScript support with full type definitions
          - Modern ESM modules
          - Bun runtime support
          - Enhanced CLI experience
          
          ### Installation
          ```bash
          npm install -g hostparty@${{ steps.version.outputs.version }}
          # or
          bun install -g hostparty@${{ steps.version.outputs.version }}
          ```
          
          ### Breaking Changes
          - Now requires Node.js 18+ or Bun
          - ESM modules only (no CommonJS)
          - CLI binary location changed to `dist/bin/cli.js`
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/v1.0.16...${{ github.ref_name }}
        draft: false
        prerelease: false
        
    - name: Publish to NPM
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        echo "Publishing to NPM..."
        npm publish --access public
        echo "✅ Successfully published to NPM!"
        
    - name: Create deployment summary
      run: |
        echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ **NPM Package**: https://www.npmjs.com/package/hostparty" >> $GITHUB_STEP_SUMMARY
        echo "✅ **GitHub Release**: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Installation" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "npm install -g hostparty@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY