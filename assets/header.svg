<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGradient)" rx="15"/>
  
  <!-- Decorative network nodes -->
  <circle cx="100" cy="50" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="150" cy="80" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="680" cy="40" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="720" cy="70" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="750" cy="120" r="2" fill="#ffffff" opacity="0.3"/>
  
  <!-- Connection lines -->
  <line x1="100" y1="50" x2="150" y2="80" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="680" y1="40" x2="720" y2="70" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="720" y1="70" x2="750" y2="120" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  
  <!-- Computer/Server icon -->
  <g transform="translate(50, 130)">
    <rect x="0" y="0" width="40" height="25" rx="3" fill="#ffffff" opacity="0.9"/>
    <rect x="3" y="3" width="34" height="16" rx="1" fill="#667eea"/>
    <rect x="15" y="27" width="10" height="8" rx="1" fill="#ffffff" opacity="0.9"/>
    <rect x="12" y="35" width="16" height="3" rx="1" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- DNS/Network icon -->
  <g transform="translate(710, 130)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <circle cx="20" cy="20" r="12" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <circle cx="20" cy="20" r="6" fill="#ffffff" opacity="0.9"/>
    <circle cx="20" cy="20" r="2" fill="#667eea"/>
  </g>
  
  <!-- Main title -->
  <text x="400" y="80" text-anchor="middle" fill="url(#textGradient)" 
        font-family="Arial, sans-serif" font-size="48" font-weight="bold" filter="url(#glow)">
    HostParty
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="110" text-anchor="middle" fill="#ffffff" 
        font-family="Arial, sans-serif" font-size="16" opacity="0.9">
    Cross-platform TypeScript API &amp; CLI for hosts file management
  </text>
  
  <!-- Tech badges -->
  <g transform="translate(280, 130)">
    <!-- TypeScript badge -->
    <rect x="0" y="0" width="60" height="20" rx="10" fill="#007ACC"/>
    <text x="30" y="14" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">TypeScript</text>
    
    <!-- Bun badge -->
    <rect x="70" y="0" width="35" height="20" rx="10" fill="#000000"/>
    <text x="87.5" y="14" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">Bun</text>
    
    <!-- ESM badge -->
    <rect x="115" y="0" width="35" height="20" rx="10" fill="#22c55e"/>
    <text x="132.5" y="14" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">ESM</text>
    
    <!-- CLI badge -->
    <rect x="160" y="0" width="30" height="20" rx="10" fill="#8b5cf6"/>
    <text x="175" y="14" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">CLI</text>
  </g>
  
  <!-- Party emoji -->
  <text x="520" y="85" font-size="36">🎉</text>
</svg>